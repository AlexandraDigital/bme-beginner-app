<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BioMed AI</title>
    <script>
      var path = window.location.pathname;
      var base = '/bme-beginner-app';
      if (path.startsWith(base)) {
        path = path.slice(base.length) || '/';
      }
      sessionStorage.setItem('redirect', path);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
